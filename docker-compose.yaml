services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: dev
    image: mobilite-web:dev
    container_name: mobilite_web_dev
    ports:
      - "4200:4200"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=1
    depends_on:
      - api

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: dev
    image: mobilite-api:dev
    container_name: mobilite_api_dev
    ports:
      - "3000:3000"
    environment:
      - HOST=db
      - USER=postgres
      - PG_PORT=5432
      - PASSWORD=postgres
      - DATABASE=mobilite-db
      - EXPRESS_PORT=3000
      - DIALECT=postgres
      - OPERATORSALIASES=false
    volumes:
      - ./Backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:16-alpine
    container_name: mobilite_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mobilite-db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data: