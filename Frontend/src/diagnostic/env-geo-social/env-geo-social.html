<div class="bg-gray-600 w-full">
    <h2 class="uppercase font-bold text-white pl-2">Environnement geographique et social</h2>
</div>
<div class="pt-4"></div>
<div class="flex flex-col gap-3">
    <p class="font-bold">Dans votre commune vous avez accès aux :</p>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Transports en commun
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Train
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        TAD
    </label>

    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        (change)="autreChoix = !autreChoix">
        Autre :
        <input *ngIf="autreChoix" type="text"
        (input)="autreChoixTexte = $any($event.target).value"
        placeholder="Précisez..."
        class="w-90 border border-black rounded px-2 py-1 text-sm">
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Rien
    </label>
    <div class="pb-4"></div>
</div>
