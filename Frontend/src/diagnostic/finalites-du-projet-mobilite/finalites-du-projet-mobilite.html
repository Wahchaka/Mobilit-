<div [formGroup]="formGroup">
    <div class="bg-gray-600 w-full">
        <h2 class="uppercase font-bold text-white pl-2"> Finalités du projet mobilité</h2>
    </div>
    <div class="pt-4"></div>
    <div class="flex flex-col gap-2">
        <label for="" class="flex items-center gap-2">
            <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
            formControlName="meDeplacerPourAllerAuTravail">
            Me déplacer pour aller au travail
        </label>
        <label for="" class="flex items-center gap-2">
            <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
            formControlName="meDeplacerDansLExerciceDeMonTravail">
            Me déplacer dans l'exercice de mon travail
        </label>
        <label for="" class="flex items-center gap-2">
            <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
            formControlName="meDeplacerPourMaVieQuotidienne">
            Me déplacer pour ma vue quotidienne
        </label>
        <label for="" class="flex items-center gap-2">
            <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
            formControlName="repondreAuxExigencesDeLEmployeur">
            Répondre aux éxigence de l'employeur
        </label>
        <label for="" class="flex items-center gap-2">
            <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
            formControlName="repondreAuxExigencesDuPrescripteur">
            Répondre aux éxigence du prescripteur
        </label>
        <label for="" class="flex items-center gap-2">
            <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
            formControlName="repondreAuxExigencesDUnTiersEntourage">
            Répondre aux éxigences d'un tiers/entourage
        </label>
        <label for="" class="flex items-center gap-2">
            <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
            formControlName="etreFierDeMoiRealisationPersonnelle">
            Être fier de moi, réalisation personnelle
        </label>
    </div>
    <div class="pt-4"></div>
</div>
