<div class="bg-gray-600 w-full">
    <h2 class="uppercase font-bold text-white pl-2">Coordonnées</h2>
</div>
<div class="pt-4"></div>
<div class="flex flex-col">
    <label for="nomPrenom">Nom/Prénom :</label>
    <input class="border-black border rounded-lg w-220 p-1" type="text" id="nomPrenom"/>
    <div class="pb-4"></div>
    <label for="dateDeNaissance">Date de naissance :</label>
    <input class="border-black border rounded-lg w-220 p-1" type="text" id="dateDeNaissance"/>
    <div class="pb-4"></div>
    <label for="adresse">Adresse :</label>
    <input class="border-black border rounded-lg w-220 p-1" type="text" id="adresse"/>
    <div class="pb-4"></div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label for="codePostal">Code postal :</label>
            <input class="border-black border rounded-lg w-full p-1" type="number" id="codePostal"/>
        </div>
        <div>
            <label for="ville">Ville :</label>
            <input class="border-black border rounded-lg w-full p-1" type="text" id="ville"/>
        </div>
        <div class="pb-4"></div>
    </div>
    <label for="tel">Téléphone :</label>
    <input class="border-black border rounded-lg w-220 p-1" type="number" id="tel"/>
    <div class="pb-4"></div>
    <label for="email">Email :</label>
    <input class="border-black border rounded-lg w-220 p-1" type="email" id="email"/>
    <div class="pb-4"></div>
</div>
