<div class="bg-gray-600 w-full">
    <h2 class="uppercase font-bold text-white pl-2">Coordonnées</h2>
</div>
<div class="pt-4"></div>
<label class="mr-2" for="nomPrenom">Nom/Prénom :</label>
<input class="border-black border-b w-220 p-1 outline-none" type="text" id="nomPrenom"/>
<div class="pb-4"></div>
<label class="mr-2" for="dateDeNaissance">Date de naissance :</label>
<input class="border-black border-b w-220 p-1 outline-none" type="text" id="dateDeNaissance"/>
<div class="pb-4"></div>
<label class="mr-2" for="adresse">Adresse :</label>
<input class="border-black border-b w-220 p-1 outline-none" type="text" id="adresse"/>
<div class="pb-4"></div>
<div class="flex">
    <div>
        <label class="mr-2" for="codePostal">Code postal :</label>
        <input class="border-black border-b w-100 p-1 mr-6 outline-none" type="number" id="codePostal"/>
    </div>
    <div>
        <label class="mr-2" for="ville">Ville :</label>
        <input class="border-black border-b w-100 p-1 outline-none" type="text" id="ville"/>
    </div>
</div>
<div class="pb-4"></div>
<label class="mr-2" for="tel">Téléphone :</label>
<input class="border-black border-b w-220 p-1 outline-none" type="number" id="tel"/>

<label class="mr-2" for="email">Email :</label>
<input class="border-black border-b w-220 p-1 outline-none" type="email" id="email"/>
