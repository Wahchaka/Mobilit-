<div class="bg-gray-600 w-full">
    <h2 class="uppercase font-bold text-white pl-2">Status Mobilité</h2>
</div>
<div class="pt-4"></div>
<div class="flex flex-col gap-3">
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="codeObtenu">
        Code obtenu
        <input *ngIf="formGroup.get('codeObtenu')?.value" type="text"
        formControlName="codeObtenuTexte"
        class="w-180 border-b border-black px-2 py-1 text-sm outline-none">
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Fin de parcours conduite
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Permis étranger non valide
    </label>

    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Code en cours
    </label>

    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Permis B
    </label>

    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Permis autres
    </label>
    <div class="pb-4"></div>
</div>
