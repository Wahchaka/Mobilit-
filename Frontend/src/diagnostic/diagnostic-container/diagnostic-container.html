<form [formGroup]="form">
    <app-nav-bar></app-nav-bar>
    <div class="flex justify-center items-start h-screen">
        <div class="w-300 border-3 border-black p-4 rounded-sm">
            <h2 class="flex justify-center items-center font-bold pt-10 pb-10">2</h2>
            <h1 class="flex justify-center items-center font-bold text-2xl pb-8 uppercase">Diagnostic Mobilité</h1>
                <label class="mr-2" for="entretienDate">Date et lieu de l'entretien :</label>
                <input class="border-black border-b w-140 p-1 outline-none" type="text" id="entretienDate"/>
                <div class="pb-4"></div>
                <label class="mr-2" for="prescripteur">Prescripteur :</label>
                <input class="border-black border-b w-140 p-1 outline-none" type="text" id="prescripteur"/>
                <div class="pb-4"></div>
                <div class="flex">
                    <div>
                        <label class="mr-2" for="nomMe">Nom :</label>
                        <input class="border-black border-b w-100 p-1 mr-6 outline-none" type="text" id="nomMe"/>
                    </div>
                    <div>
                        <label class="mr-2" for="telMe">Téléphone :</label>
                        <input class="border-black border-b w-100 p-1 outline-none" type="number" id="telMe"/>
                    </div>
                </div>
                <div class="pb-4"></div>
            <app-diagnostic-coordonness [formGroup]="coordonnees"></app-diagnostic-coordonness>
            <app-status-emploi [formGroup]="statusEmploi"></app-status-emploi>
            <app-status-mobilite [formGroup]="statusMobilite"></app-status-mobilite>
            <app-projet-permis-de-conduire [formGroup]="projetPermisConduire" ></app-projet-permis-de-conduire>
            <app-niveau-etude [formGroup]="niveauDEtudes" ></app-niveau-etude>
            <app-situation-familiale [formGroup]="situationFamiliale" ></app-situation-familiale>
            <app-ressources [formGroup]="ressource"></app-ressources>
            <app-accompagnement-social [formGroup]="AccompagnementSocial" ></app-accompagnement-social>
            <app-situation-logement [formGroup]="situationLogement" ></app-situation-logement>
            <app-choix-localisation-domicile [formGroup]="choixLocalisationDomicile" ></app-choix-localisation-domicile>
            <app-env-geo-social [formGroup]="environnementGeographiqueSocial" ></app-env-geo-social>
            <app-projet-de-demenagement [formGroup]="ProjetDeDemenagement"></app-projet-de-demenagement>
            <app-annee-arriver-france [formGroup]="anneeArriverFrance"></app-annee-arriver-france>
            <app-personnes-a-charge [formGroup]="personnesACharge"></app-personnes-a-charge>
            <app-sante [formGroup]="sante"></app-sante>
            <app-habitude-de-transport></app-habitude-de-transport>
            <app-projet-achat></app-projet-achat>
            <button type="button" class="text-body bg-white box-border 
            border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading 
            focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-2xl 
            text-sm px-4 py-2.5 focus:outline-none cursor-pointer mt-12" (click)="submit()">VALIDER</button>
        </div>
    </div>
</form>
