<div [formGroup]="formGroup">
<div class="bg-gray-600 w-full">
    <h2 class="uppercase font-bold text-white pl-2">Situation familiale</h2>
</div>
<div class="pt-4"></div>
<div class="flex flex-col gap-3">
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="veuf">
        Veuf(ve)
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="divorcé">
        Divorcé(e) /Séparé(e)
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="celib">
        Célibataire
    </label>

    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="marié">
        Marié(e)/PACSE/concubinage
    </label>

    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="sansEnfant">
        Sans enfant
    </label>

    <label class="flex items-center gap-2">
    <input
        type="checkbox"
        class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="enfant">
    Enfants :
    <input
        *ngIf="formGroup.get('enfant')?.value"
        type="number"
        formControlName="enfantTexte"
        placeholder="Combien ?"
        class="w-26 border-b border-black px-2 py-1 text-sm outline-none">
</label>
    <div class="pb-4"></div>
</div>
</div>
