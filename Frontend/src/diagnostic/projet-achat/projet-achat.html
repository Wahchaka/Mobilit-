<div [formGroup]="formGroup">
    <div class="bg-gray-600 w-full">
        <h2 class="uppercase font-bold text-white pl-2">Projet achat</h2>
    </div>
    <div class="pt-4"></div>

    <div class="flex gap-60">
        <div [formArrayName]="'projetAchat'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Projet Achat :</p>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="non" class="accent-blue-600 h-5 w-5 cursor-pointer">Non</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="voiture5Places" class="accent-blue-600 h-5 w-5 cursor-pointer">Voiture 5 places</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="voiture2Places" class="accent-blue-600 h-5 w-5 cursor-pointer">Voiture 2 places</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="voiturette" class="accent-blue-600 h-5 w-5 cursor-pointer">Voiturette</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="moto" class="accent-blue-600 h-5 w-5 cursor-pointer">Moto</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="scooter" class="accent-blue-600 h-5 w-5 cursor-pointer">Scooter</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="veloConventionnel" class="accent-blue-600 h-5 w-5 cursor-pointer">Vélo conventionnel</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="veloElectrique" class="accent-blue-600 h-5 w-5 cursor-pointer">Vélo électrique</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="trottinette" class="accent-blue-600 h-5 w-5 cursor-pointer">Trotinette</label>
            </div>
        </div>

        <div [formArrayName]="'projetLocation'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Projet location :</p>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="non" class="accent-blue-600 h-5 w-5 cursor-pointer">Non</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="voiture5Places" class="accent-blue-600 h-5 w-5 cursor-pointer">Voiture 5 places</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="voiture2Places" class="accent-blue-600 h-5 w-5 cursor-pointer">Voiture 2 places</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="voiturette" class="accent-blue-600 h-5 w-5 cursor-pointer">Voiturette</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="moto" class="accent-blue-600 h-5 w-5 cursor-pointer">Moto</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="scooter" class="accent-blue-600 h-5 w-5 cursor-pointer">Scooter</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="veloConventionnel" class="accent-blue-600 h-5 w-5 cursor-pointer">Vélo conventionnel</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="veloElectrique" class="accent-blue-600 h-5 w-5 cursor-pointer">Vélo électrique</label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" formControlName="trottinette" class="accent-blue-600 h-5 w-5 cursor-pointer">Trotinette</label>
            </div>
        </div>
    </div>
    <div class="pt-6"></div>
    <div class="flex flex-col gap-3">
        <div [formArrayName]="'CreditOuEmpruntEstCeUneAlternativePossiblePourVous'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Crédit/emprunt : est-ce une alternative possible pour vous ?</p>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="oui">
                    Oui
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="ouiSelonLaNecesssite">
                    Oui, selon la nécessité
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="nonManqueDeRessource">
                    Non, manque de ressource
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="nonInterditBancaire">
                    Non, interdit bancaire
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="nonIncicentRemboursement">
                    Non, incident remboursement
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="nonRaisonPersonnelle">
                    Non, raison personnelle
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="autre">
                    Autre :
                    <input *ngIf="getGroup('CreditOuEmpruntEstCeUneAlternativePossiblePourVous', 0).get('autre')?.value" type="text"
                    formControlName="autreTexte"
                    placeholder="Précisez..."
                    class="w-180 border-b border-black px-2 py- text-sm outline-none">
                </label>
            </div>
        </div>
        <div [formArrayName]="'dette'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Dettes ?</p>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="non">
                    Non
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="ouiPlanDeSurendettement">
                    Oui, plan de surendettement
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="ouiDettesDansUneAutoEcole">
                    Oui, dettes dans une auto-école
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="ouiDettesLieesAuTransportEnCommun">
                    Oui, dettes liées au transport en commun
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 h-5 w-5 cursor-pointer"
                    formControlName="autre">
                    Autre :
                    <input *ngIf="getGroup('dette', 0).get('autre')?.value" type="text"
                    formControlName="autreTexte"
                    placeholder="Précisez..."
                    class="w-180 border-b border-black px-2 py-1 text-sm outline-none">
                </label>
            </div>
        </div>
        <div [formArrayName]="'decisionBudgetAvezVousLaGestionDeVotrePopreBudget'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Décision budget, avez-vous la gestion de votre propre budget ?</p>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="oui">
                    Oui
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="nonTutelle">
                    Non, tutelle
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="nonCuratelle">
                    Non, curatelle
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="nonGestionParUnMembreDuFoyer">
                    Non, gestion par un autre membre du foyer :
                    <input type="text" *ngIf="getGroup('decisionBudgetAvezVousLaGestionDeVotrePopreBudget', 0).get('nonGestionParUnMembreDuFoyer')?.value"
                    formGroupName="nonGestionParUnMembreDuFoyerTexte"
                    placeholder="Qui ?"
                    class="w-180 border-b border-black px-2 py-1 text-sm outline-none">
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="autre">
                    Autre :
                    <input type="text" *ngIf="getGroup('decisionBudgetAvezVousLaGestionDeVotrePopreBudget', 0).get('autre')?.value"
                    formGroupName="autreTexte"
                    placeholder="Précisez..."
                    class="w-180 border-b border-black px-2 py-1 text-sm outline-none">
                </label>
            </div>
        </div>
        <div [formArrayName]="'revenusAllocation'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Revenus allocation ?</p>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="aucunRevenu">
                    Aucun revenu
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="revenuDuMenage">
                    Revenu du ménage
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="salaire">
                    Salaire
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="RSARevenuDeSolidariteActive">
                    RSA Revenu de Solidarité Active
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="ASSAllocationSpecifiqueDeSolidarite">
                    ASS Allocation Spécifique de Solidarité
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="CEJ">
                    CEJ
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="primeDActivite">
                    Prime d'activité
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="AREAllocationRetourALEmploi">
                    ARE Allocation Retour à l'Emploi
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="AAHAllocationAdulteHandicape">
                    AAH Allocation Adulte Handicapé
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="AEEHAllocationEducationEnfantHandicape">
                    AEEH Allocation Education Enfant Handicapé
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="pensionInvalidite">
                    Pension invalidité
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="ASIAllocationSupplementaireInvalidite">
                    AEEH Allocation Supplémentaire Invalidité
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="pensionRetraite">
                    Pension retraite
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="ASPAAllocationDeSolidariteAuxPersonnesAgees">
                    ASPA Allocation de Solidarité aux Personnes Agées (minimum vieilesse)
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="pensionAlimentaire">
                    Pension alimentaire
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="allocationVeuvage">
                    Allocation veuvage
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="allocationDemandeurDAsile">
                    Allocation demandeur d'asile
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="APL">
                    APL
                </label>
                <label for="" class="flex items-center gap-2">
                    <input type="checkbox" class="h-5 w-5 accent-blue-600 cursor-pointer"
                    formControlName="autreAllocationCAF">
                    Autre allocation CAF :
                    <input type="text" *ngIf="getGroup('revenusAllocation', 0).get('autreAllocationCAF')?.value"
                    formControlName="autreAllocationCAFTexte"
                    placeholder="Précisez..."
                    class="w-180 border-b border-black px-2 py-1 text-sm outline-none">
                </label>
            </div>
        </div>
    </div>
    <div class="pb-4"></div>
</div>
