<div [formGroup]="formGroup">
    <div class="bg-gray-600 w-full">
        <h2 class="uppercase font-bold text-white pl-2">Projet achat</h2>
    </div>
    <div class="pt-4"></div>

    <div class="flex gap-60">
        <div [formArrayName]="'projetAchat'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Projet Achat :</p>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="non" class="accent-blue-600 cursor-pointer">Non</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="voiture5Places" class="accent-blue-600 cursor-pointer">Voiture 5 places</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="voiture2Places" class="accent-blue-600 cursor-pointer">Voiture 2 places</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="voiturette" class="accent-blue-600 cursor-pointer">Voiturette</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="moto" class="accent-blue-600 cursor-pointer">Moto</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="scooter" class="accent-blue-600 cursor-pointer">Scooter</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="veloConventionnel" class="accent-blue-600 cursor-pointer">Vélo conventionnel</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="veloElectrique" class="accent-blue-600 cursor-pointer">Vélo électrique</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="trottinette" class="accent-blue-600 cursor-pointer">Trotinette</label>
            </div>
        </div>

        <div [formArrayName]="'projetLocation'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Projet location :</p>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="non" class="accent-blue-600 cursor-pointer">Non</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="voiture5Places" class="accent-blue-600 cursor-pointer">Voiture 5 places</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="voiture2Places" class="accent-blue-600 cursor-pointer">Voiture 2 places</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="voiturette" class="accent-blue-600 cursor-pointer">Voiturette</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="moto" class="accent-blue-600 cursor-pointer">Moto</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="scooter" class="accent-blue-600 cursor-pointer">Scooter</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="veloConventionnel" class="accent-blue-600 cursor-pointer">Vélo conventionnel</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="veloElectrique" class="accent-blue-600 cursor-pointer">Vélo électrique</label>
                <label class="flex items-center gap-2"><input type="checkbox" formControlName="trottinette" class="accent-blue-600 cursor-pointer">Trotinette</label>
            </div>
        </div>
    </div>
    <div class="pt-6"></div>
    <div class="flex flex-col gap-3">
        <div [formArrayName]="'CreditOuEmpruntEstCeUneAlternativePossiblePourVous'">
            <div [formGroupName]="0">
                <p class="font-bold pb-2">Crédit/emprunt : est-ce une alternative possible pour vous ?</p>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 cursor-pointer"
                    formControlName="oui">
                    Oui
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 cursor-pointer"
                    formControlName="ouiSelonLaNecesssite">
                    Oui, selon la nécessité
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 cursor-pointer"
                    formControlName="nonManqueDeRessource">
                    Non, manque de ressource
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 cursor-pointer"
                    formControlName="nonInterditBancaire">
                    Non, interdit bancaire
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 cursor-pointer"
                    formControlName="nonIncicentRemboursement">
                    Non, incident remboursement
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 cursor-pointer"
                    formControlName="nonRaisonPersonnelle">
                    Non, raison personnelle
                </label>
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-600 cursor-pointer"
                    formControlName="autre">
                    Autre :
                    <input *ngIf="formGroup.get('autre')?.value" type="text"
                    formControlName="autreTexte"
                    placeholder="Précisez..."
                    class="w-180 border-b border-black px-2 py- text-sm outline-none">
                </label>
            </div>
        </div>
    </div>
</div>
