<div [formGroup]="formGroup">
<div class="bg-gray-600 w-full">
    <h2 class="uppercase font-bold text-white pl-2">Année d'arriver en France</h2>
</div>
<div class="pt-4"></div>
<label class="mr-2" for="anneeFrance">Année d'arriver en France :</label>
<input class="border-black border-b outline-none w-50 p-1" type="number" id="anneeFrance"/>
<div class="pt-2"></div>
<div class="flex flex-col gap-3">
    <p class="font-bold">Possédez-vous les documents suivants ? :</p>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="papiersDIdentitéValide">
        Papiers d'identité valide
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="carteDeSéjourValide">
        Carte de séjour valide
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="RécépisséDeDemandeDeTitreDeSéjour">
        Récépissé de demande de titre de séjour
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        formControlName="aucunDesDocumentsCités">
        Aucun des documents cités
    </label>
    <div class="pb-4"></div>
</div>
</div>
