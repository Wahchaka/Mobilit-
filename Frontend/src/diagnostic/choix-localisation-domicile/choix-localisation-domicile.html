<div class="bg-gray-600 w-full">
    <h2 class="uppercase font-bold text-white pl-2">Choix de la localisation du domicile actuel</h2>
</div>
<div class="pt-4"></div>
<label class="mr-2" for="communeActuelle">Année d'arrivée dans votre commune actuelle :</label>
<input class="border-black border rounded-lg w-40 p-1" type="number" id="communeActuelle"/>
<div class="pt-2"></div>
<div class="flex flex-col gap-3">
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Un choix personnel
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Un compromis
    </label>
    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer">
        Une décision subie
    </label>

    <label class="flex items-center gap-2">
        <input type="checkbox" class="w-5 h-5 accent-blue-600 cursor-pointer"
        (change)="autreChoix =!autreChoix">
        Autres :
        <input *ngIf="autreChoix" type="text"
        (input)="autreChoixTexte = $any($event.target).value"
        placeholder="Précisez..."
        class="w-90 border border-black rounded px-2 py-1 text-sm">
    </label>
    <div class="pb-4"></div>
</div>
